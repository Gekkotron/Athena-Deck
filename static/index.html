<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Athena Deck</title>
<style>
  :root {
    --bg: #07091a;
    --panel: rgba(22, 25, 34, 0.78);
    --panel-2: rgba(28, 32, 48, 0.85);
    --border: #2a2f3c;
    --text: #e6e8ee;
    --muted: #8a93a6;
    --accent: #6aa3ff;
    --error: #ff7676;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.4;
    position: relative;
    overflow-x: hidden;
  }
  /* Animated background: three soft blue/indigo blobs drifting slowly. */
  body::before {
    content: "";
    position: fixed;
    inset: -25%;
    z-index: -1;
    background:
      radial-gradient(ellipse 55% 45% at 25% 25%, rgba(70, 115, 230, 0.32), transparent 65%),
      radial-gradient(ellipse 50% 50% at 75% 60%, rgba(40, 85, 200, 0.26), transparent 65%),
      radial-gradient(ellipse 65% 50% at 50% 95%, rgba(20, 60, 150, 0.22), transparent 70%);
    animation: drift 28s ease-in-out infinite alternate;
    pointer-events: none;
    will-change: transform;
  }
  @keyframes drift {
    0%   { transform: translate(0%,  0%)  rotate(0deg)  scale(1);    }
    50%  { transform: translate(-3%, 2%)  rotate(4deg)  scale(1.05); }
    100% { transform: translate(2%, -3%)  rotate(-3deg) scale(1);    }
  }
  @media (prefers-reduced-motion: reduce) {
    body::before { animation: none; }
  }
  header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    margin: 0;
    margin-right: auto;
    letter-spacing: 0.2px;
  }
  header h1 .target {
    color: var(--muted);
    font-weight: 400;
  }
  button, input {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 6px;
    font: inherit;
    font-size: 13px;
  }
  button { cursor: pointer; }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { opacity: 0.5; cursor: default; }
  input { width: 200px; }
  input:focus { outline: none; border-color: var(--accent); }
  .status {
    padding: 8px 20px;
    font-size: 12px;
    color: var(--muted);
    min-height: 18px;
  }
  .status.error { color: var(--error); }
  .progress {
    height: 3px;
    background: var(--panel);
    overflow: hidden;
  }
  .progress > div {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.25s ease-out;
  }
  main {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    transition: border-color 0.15s, transform 0.15s;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .card.dragging {
    opacity: 0.35;
    transform: scale(0.98);
  }
  .card.drag-over {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }
  .card .meta { user-select: none; }
  .thumb {
    aspect-ratio: 16 / 10;
    background: linear-gradient(135deg, #0a0d1a 0%, #0e1226 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 11px;
    overflow: hidden;
    position: relative;
  }
  /* Shimmer sweep — visible until the thumb is `loaded` or `failed`. */
  .thumb::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      110deg,
      transparent 0%,
      transparent 35%,
      rgba(106, 163, 255, 0.14) 50%,
      transparent 65%,
      transparent 100%
    );
    background-size: 220% 100%;
    animation: shimmer 1.6s linear infinite;
    pointer-events: none;
  }
  .thumb.loaded::after,
  .thumb.failed::after { display: none; }
  .thumb.failed::before {
    content: "no preview";
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    opacity: 0.7;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .thumb::after { animation: none; opacity: 0.5; }
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top left;
    display: block;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .thumb.loaded img { opacity: 1; }
  .meta { padding: 11px 14px 13px; }
  .title {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
  }
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--muted);
    padding: 80px 20px;
    font-size: 14px;
  }
  @media (max-width: 540px) {
    main { grid-template-columns: 1fr; }
    header { padding: 12px 14px; }
    input { width: 100%; }
    header h1 { width: 100%; }
  }
</style>
</head>
<body>
  <header>
    <h1>Athena Deck <span class="target" id="host-label"></span></h1>
    <input id="host-input" type="text" placeholder="Target host (optional)" autocomplete="off">
    <button id="btn-scan" type="button">Scan</button>
  </header>
  <div class="progress" id="prog" hidden><div></div></div>
  <div class="status" id="status"></div>
  <main id="grid"></main>

<script>
(() => {
  const grid = document.getElementById('grid');
  const statusEl = document.getElementById('status');
  const progEl = document.getElementById('prog');
  const progBar = progEl.firstElementChild;
  const btnScan = document.getElementById('btn-scan');
  const hostInput = document.getElementById('host-input');
  const hostLabel = document.getElementById('host-label');

  const STORAGE_KEY = 'athena-deck:host';
  const ORDER_KEY = 'athena-deck:order';
  // Hosts the backend uses internally that don't resolve in the browser.
  // For these, we substitute window.location.hostname when building card links.
  const INTERNAL_HOSTS = new Set([
    'host.docker.internal', '127.0.0.1', 'localhost', '0.0.0.0', '::1',
  ]);

  hostInput.value = localStorage.getItem(STORAGE_KEY) || '';
  updateHostLabel();
  hostInput.addEventListener('input', () => {
    localStorage.setItem(STORAGE_KEY, hostInput.value);
    updateHostLabel();
  });

  function updateHostLabel() {
    const v = hostInput.value.trim();
    hostLabel.textContent = v ? `· ${v}` : '';
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
    }[c]));
  }

  function linkFor(s) {
    const host = INTERNAL_HOSTS.has(s.scan_host) ? window.location.hostname : s.scan_host;
    return `${s.scheme}://${host}:${s.port}`;
  }

  function loadOrder() {
    try { return JSON.parse(localStorage.getItem(ORDER_KEY) || '[]') || []; }
    catch { return []; }
  }
  function saveOrder(svcs) {
    localStorage.setItem(ORDER_KEY, JSON.stringify(svcs.map(s => s.port)));
  }
  function applyOrder(svcs) {
    const order = loadOrder();
    if (!order.length) return svcs.slice();
    const byPort = new Map(svcs.map(s => [s.port, s]));
    const out = [];
    for (const p of order) {
      const s = byPort.get(p);
      if (s) { out.push(s); byPort.delete(p); }
    }
    // Append any newly discovered services not yet in the saved order.
    for (const s of byPort.values()) out.push(s);
    return out;
  }

  let currentServices = [];

  function renderServices(svcs) {
    currentServices = applyOrder(svcs || []);
    if (!currentServices.length) {
      grid.innerHTML = '<div class="empty">No services yet. Run a scan to discover what is listening on this host.</div>';
      return;
    }
    grid.innerHTML = '';
    for (const s of currentServices) grid.appendChild(buildCard(s));
  }

  function buildCard(s) {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = linkFor(s);
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.draggable = true;
    a.dataset.port = String(s.port);
    const cacheBust = s.last_seen ? `?t=${encodeURIComponent(s.last_seen)}` : '';
    a.innerHTML = `
      <div class="thumb">
        <img loading="lazy" src="${esc(s.thumb)}${cacheBust}" alt=""
             onload="this.parentElement.classList.add('loaded')"
             onerror="this.parentElement.classList.add('failed'); this.remove();">
      </div>
      <div class="meta">
        <div class="title">${esc(s.title || ('port ' + s.port))}</div>
        <div class="sub">${esc(s.scheme)} · port ${esc(s.port)}</div>
      </div>
    `;
    attachDrag(a);
    return a;
  }

  function attachDrag(card) {
    card.addEventListener('dragstart', (e) => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', card.dataset.port);
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      grid.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => {
      card.classList.remove('drag-over');
    });
    card.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      card.classList.remove('drag-over');
      const srcPort = parseInt(e.dataTransfer.getData('text/plain'), 10);
      const tgtPort = parseInt(card.dataset.port, 10);
      if (Number.isNaN(srcPort) || srcPort === tgtPort) return;
      reorderServices(srcPort, tgtPort);
    });
  }

  function reorderServices(srcPort, tgtPort) {
    const svcs = currentServices.slice();
    const si = svcs.findIndex(s => s.port === srcPort);
    if (si < 0) return;
    const [moved] = svcs.splice(si, 1);
    const ti = svcs.findIndex(s => s.port === tgtPort);
    svcs.splice(ti < 0 ? svcs.length : ti, 0, moved);
    saveOrder(svcs);
    renderServices(svcs);
  }

  async function loadServices() {
    try {
      const r = await fetch('/api/services');
      const d = await r.json();
      renderServices(d);
    } catch (e) {
      setStatus('Failed to load services', true);
    }
  }

  function setStatus(text, isError) {
    statusEl.textContent = text || '';
    statusEl.classList.toggle('error', !!isError);
  }

  function setButtons(disabled) {
    btnScan.disabled = disabled;
  }

  let polling = false;
  async function pollStatus() {
    if (polling) return;
    polling = true;
    progEl.hidden = false;
    while (true) {
      let s;
      try {
        const r = await fetch('/api/scan/status');
        s = await r.json();
      } catch (e) {
        await wait(800);
        continue;
      }
      const pct = s.total ? Math.round((s.checked / s.total) * 100) : 0;
      progBar.style.width = pct + '%';
      const phase = s.phase && s.phase !== 'idle' ? s.phase : 'scan';
      if (s.running) {
        if (phase === 'ports') {
          setStatus(`scanning ports: ${s.checked}/${s.total} (${s.open_count} open)`);
        } else if (phase === 'probe') {
          setStatus(`probing HTTP on ${s.open_count} open ports…`);
        } else if (phase === 'screenshot') {
          setStatus(`capturing screenshots…`);
        } else {
          setStatus(`scanning…`);
        }
      } else {
        progBar.style.width = '100%';
        await wait(200);
        progEl.hidden = true;
        progBar.style.width = '0%';
        if (s.error) {
          setStatus(`Done with error: ${s.error}`, true);
        } else if (s.kind) {
          setStatus(`Done. ${s.open_count} open port${s.open_count === 1 ? '' : 's'}.`);
        }
        break;
      }
      await wait(700);
    }
    polling = false;
    setButtons(false);
    await loadServices();
  }

  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function startScan(kind) {
    setButtons(true);
    setStatus('Starting scan…');
    const host = hostInput.value.trim();
    const qs = host ? `?host=${encodeURIComponent(host)}` : '';
    try {
      const r = await fetch(`/api/scan/${kind}${qs}`, { method: 'POST' });
      if (!r.ok) {
        const t = await r.text().catch(() => '');
        setStatus(`Scan failed to start (${r.status}): ${t}`, true);
        setButtons(false);
        return;
      }
      pollStatus();
    } catch (e) {
      setStatus(`Scan failed: ${e}`, true);
      setButtons(false);
    }
  }

  btnScan.addEventListener('click', () => startScan('full'));

  // Initial render + attach to any in-flight scan.
  loadServices();
  fetch('/api/scan/status')
    .then(r => r.json())
    .then(s => { if (s.running) { setButtons(true); pollStatus(); } })
    .catch(() => {});
})();
</script>
</body>
</html>
