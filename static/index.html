<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Athena Deck</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  :root {
    /* Dark theme (default). [data-theme="light"] below overrides these. */
    --bg: #07091a;
    --panel: rgba(22, 25, 34, 0.78);
    --panel-2: rgba(28, 32, 48, 0.85);
    --border: #2a2f3c;
    --text: #e6e8ee;
    --muted: #8a93a6;
    --accent: #6aa3ff;
    --error: #ff7676;
    --thumb-bg: linear-gradient(135deg, #0a0d1a 0%, #0e1226 100%);
    --overlay-bg: var(--overlay-bg);
    --overlay-bg-strong: var(--overlay-bg-strong);
    --menu-bg: #161a26;
    --menu-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    --grad-1: rgba(70, 115, 230, 0.32);
    --grad-2: rgba(40, 85, 200, 0.26);
    --grad-3: rgba(20, 60, 150, 0.22);
  }
  [data-theme="light"] {
    --bg: #eef1f7;
    --panel: rgba(255, 255, 255, 0.82);
    --panel-2: rgba(245, 247, 252, 0.9);
    --border: #d4dae6;
    --text: #1a1f2c;
    --muted: #5f6979;
    --accent: #2c6fea;
    --error: #d23a3a;
    --thumb-bg: linear-gradient(135deg, #e8edf6 0%, #dde4f1 100%);
    --overlay-bg: rgba(255, 255, 255, 0.85);
    --overlay-bg-strong: rgba(255, 255, 255, 0.95);
    --menu-bg: #ffffff;
    --menu-shadow: 0 8px 24px rgba(20, 30, 60, 0.15);
    --grad-1: rgba(120, 160, 240, 0.22);
    --grad-2: rgba(80, 130, 220, 0.18);
    --grad-3: rgba(150, 180, 230, 0.18);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.4;
    position: relative;
    overflow-x: hidden;
  }
  /* Animated background: three soft blue/indigo blobs drifting slowly. */
  body::before {
    content: "";
    position: fixed;
    inset: -25%;
    z-index: -1;
    background:
      radial-gradient(ellipse 55% 45% at 25% 25%, var(--grad-1), transparent 65%),
      radial-gradient(ellipse 50% 50% at 75% 60%, var(--grad-2), transparent 65%),
      radial-gradient(ellipse 65% 50% at 50% 95%, var(--grad-3), transparent 70%);
    animation: drift 28s ease-in-out infinite alternate;
    pointer-events: none;
    will-change: transform;
  }
  @keyframes drift {
    0%   { transform: translate(0%,  0%)  rotate(0deg)  scale(1);    }
    50%  { transform: translate(-3%, 2%)  rotate(4deg)  scale(1.05); }
    100% { transform: translate(2%, -3%)  rotate(-3deg) scale(1);    }
  }
  @media (prefers-reduced-motion: reduce) {
    body::before { animation: none; }
  }
  header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    margin: 0;
    margin-right: 8px;
    letter-spacing: 0.2px;
    display: inline-flex;
    align-items: center;
    gap: 9px;
  }
  header h1 .logo {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }
  header h1 .target {
    color: var(--muted);
    font-weight: 400;
  }
  button, input {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 6px;
    font: inherit;
    font-size: 13px;
  }
  button { cursor: pointer; }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { opacity: 0.5; cursor: default; }
  input { width: 200px; }
  input:focus { outline: none; border-color: var(--accent); }
  .status {
    font-size: 12px;
    color: var(--muted);
    margin-left: 2px;           /* sits right next to the Scan button */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    max-width: 40%;
  }
  .status:empty { display: none; }
  .status.error { color: var(--error); }
  /* Margin-left:auto now lives on .btn-theme so the theme + add-cat pair
     drift to the right edge together. */
  .progress {
    height: 3px;
    background: var(--panel);
    overflow: hidden;
  }
  .progress > div {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.25s ease-out;
  }
  main {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  #grid {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  .btn-add-cat, .btn-theme {
    background: transparent;
    color: var(--muted);
    border: 1px dashed var(--border);
    padding: 7px 12px;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    line-height: 1.1;
  }
  .btn-add-cat:hover, .btn-theme:hover { color: var(--accent); border-color: var(--accent); }
  .btn-theme {
    margin-left: auto;          /* push the theme + add-cat pair to the right */
    font-size: 14px;
    padding: 5px 10px;
  }
  .cat-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .cat-header {
    margin: 0;
    padding: 6px 4px 8px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .cat-header[draggable="true"] { cursor: grab; }
  .cat-header[draggable="true"]:active { cursor: grabbing; }
  .cat-header.dragging { opacity: 0.4; }
  .cat-header .count {
    font-weight: 400;
    font-size: 11px;
    opacity: 0.6;
    text-transform: none;
    letter-spacing: 0;
  }
  .cat-header.drag-over {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(106, 163, 255, 0.05);
  }
  .cat-delete {
    margin-left: auto;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 16px;
    line-height: 1;
    padding: 0 6px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .cat-section:hover .cat-delete { opacity: 0.6; }
  .cat-delete:hover { opacity: 1; color: var(--error); }
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .cat-empty {
    grid-column: 1 / -1;
    padding: 28px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .cat-empty.drag-over {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(106, 163, 255, 0.05);
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    transition: border-color 0.15s, transform 0.15s;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    position: relative;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .card.dragging {
    opacity: 0.35;
    transform: scale(0.98);
  }
  .card.drag-over {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }
  .card-link {
    color: inherit;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-radius: 8px;
  }
  .card .meta { user-select: none; }
  .cat-menu-btn {
    position: absolute;
    top: 6px;
    left: 6px;
    width: 28px;
    height: 28px;
    padding: 0;
    border-radius: 50%;
    background: var(--overlay-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, border-color 0.15s, background 0.15s;
    cursor: pointer;
    z-index: 3;
  }
  .card:hover .cat-menu-btn,
  .cat-menu-btn:focus-visible,
  .card.menu-open .cat-menu-btn { opacity: 1; }
  .cat-menu-btn:hover {
    border-color: var(--accent);
    background: var(--overlay-bg-strong);
  }
  .tile-remove {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 26px;
    height: 26px;
    padding: 0;
    border-radius: 50%;
    background: var(--overlay-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 16px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, border-color 0.15s, background 0.15s, color 0.15s;
    cursor: pointer;
    z-index: 3;
  }
  .card:hover .tile-remove,
  .tile-remove:focus-visible { opacity: 1; }
  .tile-remove:hover {
    border-color: var(--error);
    color: var(--error);
    background: var(--overlay-bg-strong);
  }
  .hidden-footer {
    display: flex;
    justify-content: center;
    padding: 8px 0 4px;
  }
  .show-all-btn {
    background: transparent;
    color: var(--muted);
    border: 1px dashed var(--border);
    padding: 6px 14px;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .show-all-btn:hover { color: var(--accent); border-color: var(--accent); }
  .cat-menu {
    position: absolute;
    top: 40px;
    left: 6px;
    min-width: 150px;
    max-width: calc(100% - 12px);
    background: var(--menu-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px;
    z-index: 5;
    box-shadow: var(--menu-shadow);
    display: flex;
    flex-direction: column;
    gap: 1px;
    max-height: 240px;
    overflow-y: auto;
  }
  .cat-menu[hidden] { display: none; }
  .cat-menu-item {
    background: transparent;
    border: none;
    color: var(--text);
    text-align: left;
    padding: 7px 10px;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cat-menu-item:hover { background: rgba(106, 163, 255, 0.14); }
  .cat-menu-item.active { color: var(--accent); font-weight: 600; }
  .cat-menu-item.muted { color: var(--muted); font-style: italic; }
  .cat-menu-sep {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
    opacity: 0.6;
  }
  /* Privacy mode: blur the thumbnail and title for screenshots. Port number
     stays readable so the URL it points to is still useful. */
  .card.private .thumb { filter: blur(12px); }
  .card.private .title { filter: blur(4px); }
  .thumb {
    aspect-ratio: 16 / 10;
    background: var(--thumb-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 11px;
    overflow: hidden;
    position: relative;
  }
  /* Shimmer sweep — visible until the thumb is `loaded` or `failed`. */
  .thumb::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      110deg,
      transparent 0%,
      transparent 35%,
      rgba(106, 163, 255, 0.14) 50%,
      transparent 65%,
      transparent 100%
    );
    background-size: 220% 100%;
    animation: shimmer 1.6s linear infinite;
    pointer-events: none;
  }
  .thumb.loaded::after,
  .thumb.failed::after,
  .thumb.no-ui::after { display: none; }
  /* While a scan is in its screenshot phase, every thumb plays the shimmer
     again — even thumbs that already loaded a stale screenshot — so the UI
     visibly says "fresh captures are happening". */
  .thumb.refreshing::after {
    display: block;
    animation: shimmer 1.4s linear infinite;
  }
  .thumb.refreshing img { opacity: 0.55; }
  /* Services that responded with HTTP 404 have no real web UI at "/" — show a
     calm placeholder instead of a captured 404 error page. */
  .thumb.no-ui::before {
    content: "no web interface";
    color: var(--muted);
    font-size: 10.5px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    opacity: 0.65;
  }
  .thumb.failed::before {
    content: "no preview";
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    opacity: 0.7;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .thumb::after { animation: none; opacity: 0.5; }
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top left;
    display: block;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .thumb.loaded img { opacity: 1; }
  .meta { padding: 11px 14px 13px; }
  .title {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
  }
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--muted);
    padding: 80px 20px;
    font-size: 14px;
  }
  @media (max-width: 540px) {
    main { grid-template-columns: 1fr; }
    header { padding: 12px 14px; }
    input { width: 100%; }
    header h1 { width: 100%; }
  }
</style>
</head>
<body>
  <header>
    <h1>
      <svg class="logo" viewBox="0 0 32 32" aria-hidden="true">
        <rect x="3"  y="3"  width="12" height="12" rx="2.5" fill="none" stroke="#6aa3ff" stroke-width="2.4"/>
        <rect x="17" y="3"  width="12" height="12" rx="2.5" fill="#6aa3ff"/>
        <rect x="3"  y="17" width="12" height="12" rx="2.5" fill="#6aa3ff"/>
        <rect x="17" y="17" width="12" height="12" rx="2.5" fill="none" stroke="#6aa3ff" stroke-width="2.4"/>
      </svg>
      <span>Athena Deck</span>
      <span class="target" id="host-label"></span>
    </h1>
    <input id="host-input" type="text" placeholder="Target host (optional)" autocomplete="off">
    <button id="btn-scan" type="button">Scan</button>
    <span class="status" id="status"></span>
    <button id="btn-theme" class="btn-theme" type="button" title="Toggle theme" aria-label="Toggle theme">🌙</button>
    <button id="btn-add-cat" class="btn-add-cat" type="button">+ Add category</button>
  </header>
  <div class="progress" id="prog" hidden><div></div></div>
  <main>
    <div id="grid"></div>
  </main>

<script>
(async () => {
  // ------------------------------------------------------------------------
  // Server-side preferences. Everything that used to live in localStorage now
  // syncs to /data/preferences.json on the backend so it's shared across
  // browsers and devices. Writes are debounced to coalesce bursts.
  // ------------------------------------------------------------------------
  const LEGACY_KEYS = {
    host: 'athena-deck:host',
    order: 'athena-deck:order',
    categories: 'athena-deck:categories',
    'cat-list': 'athena-deck:cat-list',
    hidden: 'athena-deck:hidden',
    theme: 'athena-deck:theme',
  };
  const Prefs = {
    data: {},
    _timer: null,
    async load() {
      try {
        const r = await fetch('/api/prefs');
        if (r.ok) this.data = (await r.json()) || {};
      } catch (e) {
        console.warn('prefs load failed; starting empty', e);
        this.data = {};
      }
      // First-run migration from legacy localStorage.
      if (Object.keys(this.data).length === 0) {
        const migrated = {};
        for (const [k, lsKey] of Object.entries(LEGACY_KEYS)) {
          const raw = localStorage.getItem(lsKey);
          if (raw == null) continue;
          if (k === 'host' || k === 'theme') {
            migrated[k] = raw;
          } else {
            try { migrated[k] = JSON.parse(raw); } catch {}
          }
        }
        if (Object.keys(migrated).length > 0) {
          this.data = migrated;
          await this._save();
        }
      }
    },
    get(key, fallback) {
      return key in this.data ? this.data[key] : fallback;
    },
    set(key, value) {
      this.data[key] = value;
      clearTimeout(this._timer);
      this._timer = setTimeout(() => this._save(), 300);
    },
    async _save() {
      try {
        await fetch('/api/prefs', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.data),
        });
      } catch (e) {
        console.warn('prefs save failed', e);
      }
    },
  };
  await Prefs.load();

  const grid = document.getElementById('grid');
  const statusEl = document.getElementById('status');
  const progEl = document.getElementById('prog');
  const progBar = progEl.firstElementChild;
  const btnScan = document.getElementById('btn-scan');
  const hostInput = document.getElementById('host-input');
  const hostLabel = document.getElementById('host-label');

  const btnAddCat = document.getElementById('btn-add-cat');
  const btnTheme = document.getElementById('btn-theme');

  function applyTheme(theme) {
    const isLight = theme === 'light';
    if (isLight) document.documentElement.setAttribute('data-theme', 'light');
    else document.documentElement.removeAttribute('data-theme');
    // Icon shows the current state; tooltip explains what clicking does.
    btnTheme.textContent = isLight ? '🌞' : '🌙';
    btnTheme.title = isLight ? 'Switch to dark theme' : 'Switch to light theme';
    Prefs.set('theme', isLight ? 'light' : 'dark');
  }
  applyTheme(Prefs.get('theme', 'dark'));
  btnTheme.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
    const next = current === 'light' ? 'dark' : 'light';
    applyTheme(next);
    // Offer to regenerate screenshots in the new theme so they match the
    // dashboard. Skip the offer when a scan is in flight or there's nothing
    // to refresh.
    if (isScanning) return;
    if (!currentServices.length) return;
    setTimeout(() => {
      if (confirm(`Theme changed to ${next}. Regenerate screenshots in ${next} mode?`)) {
        regenerateScreenshots(next);
      }
    }, 0);
  });
  // Hosts the backend uses internally that don't resolve in the browser.
  // For these, we substitute window.location.hostname when building card links.
  const INTERNAL_HOSTS = new Set([
    'host.docker.internal', '127.0.0.1', 'localhost', '0.0.0.0', '::1',
  ]);

  hostInput.value = Prefs.get('host', '');
  updateHostLabel();
  hostInput.addEventListener('input', () => {
    Prefs.set('host', hostInput.value);
    updateHostLabel();
  });

  function updateHostLabel() {
    const v = hostInput.value.trim();
    hostLabel.textContent = v ? `· ${v}` : '';
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
    }[c]));
  }

  function linkFor(s) {
    const host = INTERNAL_HOSTS.has(s.scan_host) ? window.location.hostname : s.scan_host;
    return `${s.scheme}://${host}:${s.port}`;
  }

  function loadOrder() {
    const v = Prefs.get('order', []);
    return Array.isArray(v) ? v : [];
  }
  function saveOrder(svcs) {
    Prefs.set('order', svcs.map(s => s.port));
  }
  function applyOrder(svcs) {
    const order = loadOrder();
    if (!order.length) return svcs.slice();
    const byPort = new Map(svcs.map(s => [s.port, s]));
    const out = [];
    for (const p of order) {
      const s = byPort.get(p);
      if (s) { out.push(s); byPort.delete(p); }
    }
    // Append any newly discovered services not yet in the saved order.
    for (const s of byPort.values()) out.push(s);
    return out;
  }

  let currentServices = [];
  let isScanning = false;          // mirrors backend SCAN_STATE.running
  let currentScanPhase = 'idle';   // mirrors backend SCAN_STATE.phase

  function loadCategories() {
    const v = Prefs.get('categories', {});
    return (v && typeof v === 'object' && !Array.isArray(v)) ? v : {};
  }
  function saveCategories(cats) {
    Prefs.set('categories', cats);
  }
  function getCategory(port) {
    return loadCategories()[String(port)] || '';
  }
  function setCategory(port, value) {
    const cats = loadCategories();
    const trimmed = (value || '').trim().slice(0, 40);
    if (trimmed) cats[String(port)] = trimmed;
    else delete cats[String(port)];
    saveCategories(cats);
  }
  function loadCatList() {
    const v = Prefs.get('cat-list', []);
    return Array.isArray(v) ? v : [];
  }
  function saveCatList(list) {
    // De-dupe while preserving order.
    const seen = new Set(), out = [];
    for (const c of list) {
      const t = (c || '').trim().slice(0, 40);
      if (t && !seen.has(t)) { seen.add(t); out.push(t); }
    }
    Prefs.set('cat-list', out);
  }
  // Make sure every category referenced by a card assignment exists in the
  // ordered list — important when migrating from older versions, or when a
  // service comes back with a category that was cleared locally.
  function loadHidden() {
    const v = Prefs.get('hidden', []);
    if (!Array.isArray(v)) return new Set();
    return new Set(v.map(Number).filter(n => !Number.isNaN(n)));
  }
  function saveHidden(set) {
    Prefs.set('hidden', [...set]);
  }

  function loadPrivate() {
    const v = Prefs.get('private', []);
    if (!Array.isArray(v)) return new Set();
    return new Set(v.map(Number).filter(n => !Number.isNaN(n)));
  }
  function savePrivate(set) {
    Prefs.set('private', [...set]);
  }
  function isPrivate(port) { return loadPrivate().has(Number(port)); }
  function setPrivate(port, on) {
    const s = loadPrivate();
    if (on) s.add(Number(port));
    else s.delete(Number(port));
    savePrivate(s);
  }

  function ensureCatList() {
    const list = loadCatList();
    const seen = new Set(list);
    for (const c of Object.values(loadCategories())) {
      if (c && !seen.has(c)) { seen.add(c); list.push(c); }
    }
    saveCatList(list);
    return loadCatList();
  }

  function renderServices(svcs) {
    currentServices = applyOrder(svcs || []);
    if (!currentServices.length && !loadCatList().length) {
      grid.innerHTML = '<div class="empty">No services yet. Run a scan to discover what is listening on this host.</div>';
      return;
    }
    renderSections();
  }

  function renderSections() {
    grid.innerHTML = '';
    const cats = loadCategories();
    const catList = ensureCatList();
    const hidden = loadHidden();
    const visibleServices = currentServices.filter(s => !hidden.has(s.port));

    // Partition services into sections, preserving the flat global order
    // inside each section. Section order: Uncategorized first, then categories
    // in cat-list order.
    const buckets = new Map();
    buckets.set('', []);
    for (const c of catList) buckets.set(c, []);
    for (const s of visibleServices) {
      const c = cats[String(s.port)] || '';
      if (!buckets.has(c)) buckets.set(c, []);  // safety net
      buckets.get(c).push(s);
    }

    // Categories first (in cat-list order), Uncategorized at the bottom.
    const sections = [...catList, ''];
    for (const cat of sections) {
      const svcs = buckets.get(cat) || [];
      // Hide an empty Uncategorized only when there are truly no visible
      // services at all — otherwise keep it as a "drag here to clear" target.
      if (cat === '' && svcs.length === 0 && visibleServices.length === 0) continue;
      grid.appendChild(buildSection(cat, svcs));
    }

    // Footer link to restore removed tiles.
    if (hidden.size > 0) {
      const footer = document.createElement('div');
      footer.className = 'hidden-footer';
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'show-all-btn';
      btn.textContent = `Show ${hidden.size} hidden tile${hidden.size === 1 ? '' : 's'}`;
      btn.addEventListener('click', () => {
        if (!confirm(`Restore all ${hidden.size} hidden tile${hidden.size === 1 ? '' : 's'}?`)) return;
        saveHidden(new Set());
        renderServices(currentServices);
      });
      footer.appendChild(btn);
      grid.appendChild(footer);
    }
  }

  function reorderCategories(srcCat, tgtCat) {
    const list = loadCatList();
    const si = list.indexOf(srcCat);
    if (si < 0) return;
    list.splice(si, 1);
    if (tgtCat === '') {
      // Dropped on Uncategorized → move to end of cat-list (renders just
      // above Uncategorized in the bottom-pinned layout).
      list.push(srcCat);
    } else {
      const ti = list.indexOf(tgtCat);
      list.splice(ti < 0 ? list.length : ti, 0, srcCat);
    }
    saveCatList(list);
    renderServices(currentServices);
  }

  function buildSection(cat, svcs) {
    const section = document.createElement('section');
    section.className = 'cat-section';
    section.dataset.cat = cat;

    const header = document.createElement('h2');
    header.className = 'cat-header';
    header.dataset.cat = cat;
    header.innerHTML = `
      <span>${esc(cat || 'Uncategorized')}</span>
      <span class="count">${svcs.length}</span>
    `;
    if (cat !== '') {
      const del = document.createElement('button');
      del.className = 'cat-delete';
      del.type = 'button';
      del.title = `Remove category "${cat}"`;
      del.setAttribute('aria-label', `Remove category ${cat}`);
      del.textContent = '×';
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!confirm(`Remove category "${cat}"?\nTiles in it will become uncategorized.`)) return;
        saveCatList(loadCatList().filter(c => c !== cat));
        const all = loadCategories();
        for (const p of Object.keys(all)) {
          if (all[p] === cat) delete all[p];
        }
        saveCategories(all);
        renderServices(currentServices);
      });
      // Don't start a category drag from the delete button.
      del.addEventListener('mousedown', (e) => e.stopPropagation());
      header.appendChild(del);

      // Make the section header itself draggable for category reordering.
      header.draggable = true;
      header.addEventListener('dragstart', (e) => {
        if (e.target.closest && e.target.closest('.cat-delete')) {
          e.preventDefault();
          return;
        }
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', 'cat:' + cat);
        header.classList.add('dragging');
      });
      header.addEventListener('dragend', () => header.classList.remove('dragging'));
    }
    attachDropTarget(header, cat);
    section.appendChild(header);

    const sgrid = document.createElement('div');
    sgrid.className = 'cat-grid';
    if (!svcs.length) {
      const empty = document.createElement('div');
      empty.className = 'cat-empty';
      empty.textContent = 'Drop a tile here to assign this category';
      attachDropTarget(empty, cat);
      sgrid.appendChild(empty);
    } else {
      for (const s of svcs) sgrid.appendChild(buildCard(s));
    }
    section.appendChild(sgrid);
    return section;
  }

  function buildCard(s) {
    const card = document.createElement('div');
    card.className = 'card' + (isPrivate(s.port) ? ' private' : '');
    card.draggable = true;
    card.dataset.port = String(s.port);

    const isNoUi = s.status === 404;
    const cacheBust = s.last_seen ? `?t=${encodeURIComponent(s.last_seen)}` : '';
    const thumbCls = isNoUi
      ? 'thumb no-ui'
      : 'thumb' + (isScanning && currentScanPhase === 'screenshot' ? ' refreshing' : '');
    const thumbInner = isNoUi
      ? ''
      : `<img loading="lazy" src="${esc(s.thumb)}${cacheBust}" alt="">`;
    card.innerHTML = `
      <a class="card-link" href="${esc(linkFor(s))}" target="_blank" rel="noopener noreferrer">
        <div class="${thumbCls}">${thumbInner}</div>
        <div class="meta">
          <div class="title">${esc(s.title || ('port ' + s.port))}</div>
          <div class="sub">${esc(s.scheme)} · port ${esc(s.port)}</div>
        </div>
      </a>
      <button class="cat-menu-btn" type="button" title="Change category" aria-label="Change category">🏷</button>
      <div class="cat-menu" hidden role="menu"></div>
      <button class="tile-remove" type="button" title="Remove tile" aria-label="Remove tile">×</button>
    `;

    const img = card.querySelector('.thumb img');
    if (img) {
      img.addEventListener('load', () => {
        img.parentElement.classList.add('loaded');
      });
      img.addEventListener('error', () => {
        // If the backend has already reported this port's capture as done, a
        // 404 here means the capture genuinely failed — don't retry, mark failed.
        if (isScanning && !img.dataset.done) {
          setTimeout(() => {
            if (!img.isConnected) return;
            const base = img.src.split('?')[0];
            img.src = base + '?retry=' + Date.now();
          }, 2500);
        } else {
          img.parentElement.classList.add('failed');
          img.remove();
        }
      });
    }

    const removeBtn = card.querySelector('.tile-remove');
    removeBtn.addEventListener('mousedown', (e) => e.stopPropagation());
    removeBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const label = s.title || ('port ' + s.port);
      if (!confirm(`Remove "${label}" from the dashboard?`)) return;
      const h = loadHidden();
      h.add(s.port);
      saveHidden(h);
      renderServices(currentServices);
    });

    const btn = card.querySelector('.cat-menu-btn');
    const menu = card.querySelector('.cat-menu');

    btn.addEventListener('mousedown', (e) => e.stopPropagation());
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const wasOpen = !menu.hidden;
      closeAllMenus();
      if (wasOpen) return;
      populateCatMenu(menu, s.port);
      menu.hidden = false;
      card.classList.add('menu-open');
    });
    menu.addEventListener('mousedown', (e) => e.stopPropagation());

    attachDrag(card);
    return card;
  }

  function populateCatMenu(menu, port) {
    menu.innerHTML = '';
    const current = getCategory(port);
    const list = loadCatList();
    if (!list.length) {
      const hint = document.createElement('div');
      hint.className = 'cat-menu-item muted';
      hint.textContent = 'No categories yet — use "+ Add category"';
      hint.style.cursor = 'default';
      menu.appendChild(hint);
    } else {
      const items = [
        { value: '', label: 'Uncategorized', muted: true, active: current === '' },
        ...list.map(c => ({ value: c, label: c, active: current === c })),
      ];
      for (const it of items) {
        const opt = document.createElement('button');
        opt.type = 'button';
        opt.className = 'cat-menu-item'
          + (it.active ? ' active' : '')
          + (it.muted ? ' muted' : '');
        opt.textContent = it.label;
        opt.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          setCategory(port, it.value);
          closeAllMenus();
          renderServices(currentServices);
        });
        menu.appendChild(opt);
      }
    }

    // ---- Privacy toggle ---------------------------------------------------
    const sep = document.createElement('div');
    sep.className = 'cat-menu-sep';
    menu.appendChild(sep);

    const blurItem = document.createElement('button');
    blurItem.type = 'button';
    blurItem.className = 'cat-menu-item';
    const currentlyPrivate = isPrivate(port);
    blurItem.textContent = currentlyPrivate ? 'Unblur thumbnail' : 'Blur thumbnail';
    blurItem.title = 'Hide this tile’s preview for screenshots';
    blurItem.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      setPrivate(port, !currentlyPrivate);
      closeAllMenus();
      renderServices(currentServices);
    });
    menu.appendChild(blurItem);
  }

  function closeAllMenus() {
    grid.querySelectorAll('.cat-menu').forEach(m => { m.hidden = true; });
    grid.querySelectorAll('.card.menu-open').forEach(c => c.classList.remove('menu-open'));
  }

  // Close any open menu on outside click or Escape.
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.cat-menu, .cat-menu-btn')) closeAllMenus();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeAllMenus();
  });

  // Drop target for section headers and empty-section placeholders.
  // Accepts both tile drops (`port:N` payload) and category-reorder drops
  // (`cat:Name` payload).
  function attachDropTarget(el, cat) {
    el.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      el.classList.remove('drag-over');
      const data = e.dataTransfer.getData('text/plain');
      if (data.startsWith('cat:')) {
        const srcCat = data.slice(4);
        if (!srcCat || srcCat === cat) return;
        reorderCategories(srcCat, cat);
        return;
      }
      if (data.startsWith('port:')) {
        const srcPort = parseInt(data.slice(5), 10);
        if (Number.isNaN(srcPort)) return;
        setCategory(srcPort, cat);
        // Push to the end of the flat order so the dropped tile lands at the
        // bottom of its new section.
        const svcs = currentServices.slice();
        const i = svcs.findIndex(s => s.port === srcPort);
        if (i >= 0) {
          const [moved] = svcs.splice(i, 1);
          svcs.push(moved);
          saveOrder(svcs);
          currentServices = svcs;
        }
        renderServices(currentServices);
      }
    });
  }

  function attachDrag(card) {
    card.addEventListener('dragstart', (e) => {
      // Don't start a tile drag from the menu button, the menu, or the
      // remove button.
      if (e.target && e.target.closest && e.target.closest('.cat-menu-btn, .cat-menu, .tile-remove')) {
        e.preventDefault();
        return;
      }
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', 'port:' + card.dataset.port);
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      grid.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => {
      card.classList.remove('drag-over');
    });
    card.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      card.classList.remove('drag-over');
      const data = e.dataTransfer.getData('text/plain');
      // Ignore category drags landing on a card — only headers reorder cats.
      if (!data.startsWith('port:')) return;
      const srcPort = parseInt(data.slice(5), 10);
      const tgtPort = parseInt(card.dataset.port, 10);
      if (Number.isNaN(srcPort) || srcPort === tgtPort) return;
      // Cross-section drop: source adopts the target's category.
      const cats = loadCategories();
      const srcCat = cats[String(srcPort)] || '';
      const tgtCat = cats[String(tgtPort)] || '';
      if (srcCat !== tgtCat) setCategory(srcPort, tgtCat);
      reorderServices(srcPort, tgtPort);
    });
  }

  function reorderServices(srcPort, tgtPort) {
    const svcs = currentServices.slice();
    const si = svcs.findIndex(s => s.port === srcPort);
    if (si < 0) return;
    const [moved] = svcs.splice(si, 1);
    const ti = svcs.findIndex(s => s.port === tgtPort);
    svcs.splice(ti < 0 ? svcs.length : ti, 0, moved);
    saveOrder(svcs);
    renderServices(svcs);
  }

  async function loadServices() {
    try {
      const r = await fetch('/api/services');
      const d = await r.json();
      renderServices(d);
    } catch (e) {
      setStatus('Failed to load services', true);
    }
  }

  function setStatus(text, isError) {
    statusEl.textContent = text || '';
    statusEl.classList.toggle('error', !!isError);
  }

  function setButtons(disabled) {
    btnScan.disabled = disabled;
  }

  let polling = false;
  async function pollStatus() {
    if (polling) return;
    polling = true;
    progEl.hidden = false;
    let finalKind = null;
    while (true) {
      let s;
      try {
        const r = await fetch('/api/scan/status');
        s = await r.json();
      } catch (e) {
        await wait(800);
        continue;
      }
      const pct = s.total ? Math.round((s.checked / s.total) * 100) : 0;
      progBar.style.width = pct + '%';
      const phase = s.phase && s.phase !== 'idle' ? s.phase : 'scan';
      const prevPhase = currentScanPhase;
      isScanning = !!s.running;
      currentScanPhase = s.phase || 'idle';

      // Drive per-tile shimmer from SCAN_STATE.screenshots_done. Tiles whose
      // port has just transitioned to "done" drop the shimmer and pre-load the
      // freshly captured PNG, only swapping the visible <img> src once the
      // bytes are ready — that avoids the brief blank-flash that would happen
      // if we set src directly on an opacity-0 image.
      if (s.running && phase === 'screenshot') {
        const done = new Set((s.screenshots_done || []).map(Number));
        grid.querySelectorAll('.card').forEach(card => {
          const port = parseInt(card.dataset.port, 10);
          const thumb = card.querySelector('.thumb');
          if (!thumb) return;
          if (done.has(port)) {
            if (thumb.classList.contains('refreshing')) {
              thumb.classList.remove('refreshing');
              const img = thumb.querySelector('img');
              if (!img) return;
              img.dataset.done = '1';
              const newSrc = img.src.split('?')[0] + '?done=' + Date.now();
              if (thumb.classList.contains('loaded')) {
                // We have a previous screenshot showing — preload the new one
                // and swap atomically so the user never sees a blank thumb.
                const pre = new Image();
                pre.addEventListener('load', () => { img.src = newSrc; });
                pre.addEventListener('error', () => {
                  // Capture failed (404). Keep the previous screenshot rather
                  // than blanking the tile.
                });
                pre.src = newSrc;
              } else {
                // First successful capture for this tile — just load it.
                img.src = newSrc;
              }
            }
          } else {
            thumb.classList.remove('failed');
            thumb.classList.add('refreshing');
          }
        });
      }

      if (s.running) {
        const sd = (s.screenshots_done || []).length;
        if (phase === 'ports') {
          setStatus(`scanning ports: ${s.checked}/${s.total} (${s.open_count} open)`);
        } else if (phase === 'probe') {
          setStatus(`probing HTTP on ${s.open_count} open ports…`);
        } else if (phase === 'screenshot') {
          setStatus(`capturing screenshots… ${sd}/${currentServices.length}`);
        } else {
          setStatus(`scanning…`);
        }
      } else {
        progBar.style.width = '100%';
        await wait(200);
        progEl.hidden = true;
        progBar.style.width = '0%';
        // Safety net: clear .refreshing from any thumb whose port never made
        // it into screenshots_done (backend crash, early exit, exception in
        // the worker, etc.). Without this, a tile can shimmer forever.
        grid.querySelectorAll('.thumb.refreshing').forEach(t => t.classList.remove('refreshing'));
        if (s.error) {
          setStatus(`Done with error: ${s.error}`, true);
        } else if (s.kind) {
          setStatus(`Done. ${s.open_count} open port${s.open_count === 1 ? '' : 's'}.`);
        }
        finalKind = s.kind || null;
        break;
      }
      await wait(700);
    }
    polling = false;
    setButtons(false);
    // For a screenshot regenerate, the per-tile sync has already swapped
    // every visible <img> to the new capture. A full loadServices() here
    // would just blink every card for nothing (and previously was the
    // source of the "revert to old color" glitch via stale HTTP cache).
    if (finalKind !== 'screenshots') {
      await loadServices();
    }
  }

  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function startScan(kind) {
    setButtons(true);
    setStatus('Starting scan…');
    const host = hostInput.value.trim();
    const qs = host ? `?host=${encodeURIComponent(host)}` : '';
    try {
      const r = await fetch(`/api/scan/${kind}${qs}`, { method: 'POST' });
      if (!r.ok) {
        const t = await r.text().catch(() => '');
        setStatus(`Scan failed to start (${r.status}): ${t}`, true);
        setButtons(false);
        return;
      }
      pollStatus();
    } catch (e) {
      setStatus(`Scan failed: ${e}`, true);
      setButtons(false);
    }
  }

  async function regenerateScreenshots(theme) {
    setButtons(true);
    setStatus(`Starting screenshot regeneration (${theme})…`);
    try {
      const r = await fetch(`/api/screenshots/regenerate?theme=${encodeURIComponent(theme)}`, { method: 'POST' });
      if (!r.ok) {
        const t = await r.text().catch(() => '');
        setStatus(`Regenerate failed (${r.status}): ${t}`, true);
        setButtons(false);
        return;
      }
      pollStatus();
    } catch (e) {
      setStatus(`Regenerate failed: ${e}`, true);
      setButtons(false);
    }
  }

  btnScan.addEventListener('click', () => startScan('full'));

  btnAddCat.addEventListener('click', () => {
    const name = prompt('New category name:');
    if (name === null) return;
    const trimmed = name.trim().slice(0, 40);
    if (!trimmed) return;
    const list = loadCatList();
    if (!list.includes(trimmed)) {
      list.push(trimmed);
      saveCatList(list);
    }
    renderServices(currentServices);
  });

  // Initial render + attach to any in-flight scan.
  loadServices();
  fetch('/api/scan/status')
    .then(r => r.json())
    .then(s => { if (s.running) { setButtons(true); pollStatus(); } })
    .catch(() => {});
})();
</script>
</body>
</html>
