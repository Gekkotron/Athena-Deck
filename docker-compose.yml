services:
  athena-deck:
    build: .
    container_name: athena-deck
    restart: unless-stopped

    # ----- Network mode -----------------------------------------------------
    # Default below is BRIDGE networking. `host.docker.internal` resolves to
    # the host on macOS / Windows out of the box, and on Linux thanks to the
    # `extra_hosts: host-gateway` line below (Docker 20.10+).
    #
    # On Linux you can alternatively switch to `network_mode: host` (see the
    # commented block at the bottom of this file) — that's what you want if
    # the dashboard should reach services that bind to 127.0.0.1 only.
    ports:
      - "8888:8888"

    # Makes `host.docker.internal` work on Linux too — Docker substitutes
    # the host's gateway IP at container start.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - APP_PORT=8888
      # Host that the scanner targets. Override per-environment.
      - SCAN_HOST=host.docker.internal
      # Optional tuning knobs:
      # - SCAN_CONCURRENCY=500
      # - SCAN_CONNECT_TIMEOUT=0.3
      # - SCREENSHOT_TIMEOUT_MS=8000

    volumes:
      # Named volume so thumbnails and services.json survive container restarts.
      - athena_data:/data

    # ----- Linux host-networking alternative -------------------------------
    # On Linux this is usually what you want: the container reaches the host's
    # services on 127.0.0.1 with no NAT, and the dashboard is reachable on the
    # host at http://<host>:8888 directly.
    #
    # IMPORTANT: when `network_mode: host` is enabled, the `ports:` mapping
    # above is IGNORED by Docker. You must also set SCAN_HOST=127.0.0.1.
    #
    # network_mode: host

volumes:
  athena_data:
